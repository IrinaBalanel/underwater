name: Static CI/CD

on:
  push:
    branches: [main, master]

jobs:
  build-and-deploy:
    runs-on: self-hosted

    env:
      IMAGE_REPOSITORY: ${{ secrets.CONTAINER_IMAGE_REPOSITORY }}
      IMAGE_TAG: ${{ github.sha }}
      CONTAINER_REGISTRY_HOST: ${{ secrets.CONTAINER_REGISTRY_HOST }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.CONTAINER_REGISTRY_HOST }}
          username: ${{ secrets.GITLAB_REGISTRY_USER }}
          password: ${{ secrets.GITLAB_REGISTRY_PASSWORD }}

      - name: Build and push image
        run: |
          set -euo pipefail
          test -n "${IMAGE_REPOSITORY}"
          docker build -t "${IMAGE_REPOSITORY}:${IMAGE_TAG}" -t "${IMAGE_REPOSITORY}:main" .
          docker push "${IMAGE_REPOSITORY}:${IMAGE_TAG}"
          docker push "${IMAGE_REPOSITORY}:main"

      - name: Package static files
        run: |
          tar -czf site.tar.gz \
            --exclude-vcs \
            --exclude='.github' \
            --exclude='Dockerfile' \
            --exclude='docker-compose.yml' \
            --exclude='.gitlab-ci.yml' \
            .

      - name: Configure SSH key
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          echo "${{ secrets.CADDY_SSH_PRIVATE_KEY_B64 }}" | base64 -d > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.CADDY_DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy static files to Caddy
        run: |
          set -euo pipefail
          host="${{ secrets.CADDY_DEPLOY_HOST }}"
          user="${{ secrets.CADDY_DEPLOY_USER }}"
          target="/opt/caddy/www/irinabalanel/underwater"
          scp site.tar.gz "${user}@${host}:/tmp/underwater-${GITHUB_SHA}.tar.gz"
          ssh "${user}@${host}" "
            set -euo pipefail
            tmp='${target}.new.${GITHUB_SHA}'
            rm -rf \"\$tmp\"
            mkdir -p \"\$tmp\"
            tar -xzf /tmp/underwater-${GITHUB_SHA}.tar.gz -C \"\$tmp\"
            rm -f /tmp/underwater-${GITHUB_SHA}.tar.gz
            rm -rf '${target}'
            mv \"\$tmp\" '${target}'
          "

      - name: Smoke test
        run: curl -fsS https://underwater.irinabalanel.com >/dev/null
