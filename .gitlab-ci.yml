stages:
  - build
  - deploy

variables:
  IMAGE_REPOSITORY: "$CI_REGISTRY_IMAGE"
  IMAGE_TAG: "$CI_COMMIT_SHA"

build:image:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  script:
    - mkdir -p /kaniko/.docker
    - echo "{\"auths\":{\"$CI_REGISTRY\":{\"username\":\"$CI_REGISTRY_USER\",\"password\":\"$CI_REGISTRY_PASSWORD\"}}}" > /kaniko/.docker/config.json
    - /kaniko/executor --context "$CI_PROJECT_DIR" --dockerfile "$CI_PROJECT_DIR/Dockerfile" --destination "$IMAGE_REPOSITORY:$IMAGE_TAG" --destination "$IMAGE_REPOSITORY:main"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

deploy:static:
  stage: deploy
  image: alpine:3.21
  before_script:
    - apk add --no-cache openssh-client
    - install -m 700 -d ~/.ssh
    - echo "$CADDY_SSH_PRIVATE_KEY_B64" | base64 -d > ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    - ssh-keyscan -H "$CADDY_DEPLOY_HOST" >> ~/.ssh/known_hosts
  script:
    - |
      set -euo pipefail
      tar -czf site.tar.gz \
        --exclude-vcs \
        --exclude='.github' \
        --exclude='Dockerfile' \
        --exclude='docker-compose.yml' \
        --exclude='.gitlab-ci.yml' \
        .
      scp site.tar.gz "${CADDY_DEPLOY_USER}@${CADDY_DEPLOY_HOST}:/tmp/underwater-${CI_COMMIT_SHA}.tar.gz"
      ssh "${CADDY_DEPLOY_USER}@${CADDY_DEPLOY_HOST}" "
        set -euo pipefail
        target=/opt/caddy/www/irinabalanel/underwater
        tmp=\"\${target}.new.${CI_COMMIT_SHA}\"
        rm -rf \"\$tmp\"
        mkdir -p \"\$tmp\"
        tar -xzf /tmp/underwater-${CI_COMMIT_SHA}.tar.gz -C \"\$tmp\"
        rm -f /tmp/underwater-${CI_COMMIT_SHA}.tar.gz
        rm -rf \"\$target\"
        mv \"\$tmp\" \"\$target\"
      "
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
